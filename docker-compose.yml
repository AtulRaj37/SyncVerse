version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: syncverse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: atulraj
      POSTGRES_DB: syncverse
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: syncverse-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
